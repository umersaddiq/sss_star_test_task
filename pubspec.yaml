name: sss_star_test_task
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  intl: ^0.20.2
  retrofit: ^4.9.2
  riverpod: ^3.2.1
  go_router: ^17.1.0
  flutter_gen: ^5.12.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cupertino_icons: ^1.0.8
  json_annotation: ^4.11.0
  flutter_riverpod: ^3.2.1
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.2
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.4
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.11.1
  riverpod_lint: ^3.1.3
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  flutter_gen_runner: ^5.12.0
  retrofit_generator: ^10.2.1
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
  fonts:
    - family: SfPro
      fonts:
        - asset: assets/fonts/SF-Pro.ttf
flutter_gen:
  assets:
  output: lib/src/gen/
  line_length: 80
  integrations:
    flutter_svg: true
